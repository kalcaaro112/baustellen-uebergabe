<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau-Protokoll BPB (Pro+)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#213c7a">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root {
            --primary: #213c7a;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --border: #333;
            --input-bg: #252525;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .container { display: flex; flex-direction: row; height: 100vh; }
        @media (max-width: 900px) { .container { flex-direction: column; height: auto; } .sidebar { width: 100% !important; border-right: none !important; border-bottom: 1px solid var(--border); padding: 15px !important; } .main-content { padding: 10px !important; } }
        .sidebar { width: 350px; background: var(--card-bg); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); position: relative; }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.1rem; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 0.85rem; opacity: 0.8; }
        
        input[type="text"], select, textarea { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 16px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 60px; }

        button { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: transform 0.1s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }
        button:active { transform: scale(0.98); }

        .btn-add { background: var(--primary); color: white; margin-top: 5px; }
        .btn-pdf { background: var(--danger); color: white; margin-top: 15px; font-size: 1rem; }
        .btn-action { background: #333; color: white; flex: 1; font-size: 0.8rem; padding: 10px; }
        .btn-edit-photo { background: #f39c12; color: white; margin-top: 5px; padding: 8px; font-size: 0.85rem; }
        
        .actions-grid { display: flex; gap: 8px; margin-top: 8px; }

        .field-card { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        .field-title { font-weight: bold; color: var(--primary); font-size: 1rem; }
        .field-controls { display: flex; gap: 4px; }
        .btn-ctrl { background: #333; color: #fff; padding: 5px 10px; font-size: 11px; width: auto; border-radius: 4px; }
        .btn-delete { background: rgba(231, 76, 60, 0.2); color: var(--danger); border: 1px solid rgba(231, 76, 60, 0.5); }

        .photo-upload-box { border: 2px dashed var(--border); padding: 15px; text-align: center; border-radius: 6px; cursor: pointer; background: var(--input-bg); font-size: 0.9rem; }
        .photo-preview-img { max-width: 100%; max-height: 250px; border-radius: 6px; margin-top: 8px; display: none; border: 1px solid #555;}
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; }
        .checkbox-wrapper input { width: 22px; height: 22px; accent-color: var(--success); cursor: pointer; }
        .checkbox-wrapper label { margin: 0; font-size: 1rem; opacity: 1; }

        /* Projektverwaltung */
        .project-header { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .project-header select { font-weight: bold; color: var(--primary); background: #111; margin-bottom: 10px;}
        .sync-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; }

        /* Zeichen-Overlay (Modal) */
        #draw-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        #draw-canvas-container { position: relative; max-width: 100%; max-height: 70vh; overflow: auto; background: #fff; border: 2px solid var(--primary); }
        #draw-canvas { cursor: crosshair; display: block; touch-action: none; }
        .draw-controls { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 400px; }

        /* --- PDF EXPORT STYLES (Native Print) --- */
        @media print {
            body { background: white; color: black; display: block; }
            .sidebar, .main-content, #draw-modal { display: none !important; }
            
            #print-zone { display: block !important; background: white; color: black; width: 100%; padding: 0; }
            
            .print-header { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
            .print-header img { max-height: 60px; margin-bottom: 10px; }
            .print-header h1 { font-size: 24px; margin: 0; text-transform: uppercase; color: #111; }
            .print-header p { font-size: 12px; color: #666; margin: 5px 0 0 0; }
            
            .print-item { margin-bottom: 15px; page-break-inside: avoid; }
            .print-label { font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
            .print-value { font-size: 14px; background: #f9f9f9; padding: 8px; border-left: 3px solid var(--primary); white-space: pre-wrap; color: #111;}
            .print-checkbox { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 5px; }
            .print-checkbox-val { font-weight: bold; font-size: 14px; }
            .print-photo { max-width: 100%; max-height: 400px; border: 1px solid #ddd; padding: 3px; margin-top: 5px; }
            .print-title { font-size: 18px; color: var(--primary); border-bottom: 1px solid #ddd; margin-top: 25px; padding-bottom: 5px; }
            
            @page { margin: 15mm; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div style="background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
            <img src="logo.png" alt="BPB Logo" style="max-width: 100%; height: auto;">
        </div>
        
        <div class="project-header">
            <label>Aktuelles Projekt / Vorhaben</label>
            <select id="project-select" onchange="switchProject()"></select>
            <div class="actions-grid">
                <button class="btn-action" onclick="newProject()">Neu</button>
                <button class="btn-action" onclick="copyProject()">Kopieren</button>
                <button class="btn-action" onclick="renameProject()">Umbenennen</button>
                <button class="btn-action" style="background:var(--danger);" onclick="deleteProject()">Löschen</button>
            </div>
            
            <div class="sync-section">
                <label>Backup aller Projekte (JSON)</label>
                <div class="actions-grid">
                    <button class="btn-action" style="background:var(--success);" onclick="exportAllProjects()">💾 Exportieren</button>
                    <button class="btn-action" onclick="document.getElementById('import-projects-file').click()">📂 Importieren</button>
                </div>
                <input type="file" id="import-projects-file" accept=".json" style="display:none" onchange="importAllProjects(event)">
            </div>
        </div>

        <h2>🛠 Editor (Kompakt)</h2>

        <div class="form-group">
            <label>Feld hinzufügen</label>
            <select id="type-select">
                <option value="checkbox">☑ To-Do / Checkbox</option>
                <option value="header">📑 Kapitel / Überschrift</option>
                <option value="text">✏️ Kurzer Text</option>
                <option value="textarea">📝 Mehrzeilige Notiz</option>
                <option value="photo">📷 Foto</option>
                <option value="location">📍 Standort (GPS)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Beschriftung (z.B. "Baustelle sauber?")</label>
            <input type="text" id="label-input" placeholder="...">
        </div>

        <button class="btn-add" onclick="addItem()">➕ Hinzufügen</button>

        <hr style="border:0; border-top: 1px solid var(--border); margin: 25px 0;">

        <button class="btn-pdf" onclick="generatePDF()">📄 PDF Drucken</button>
    </div>

    <div class="main-content" id="editor-list">
        </div>
</div>

<div id="draw-modal">
    <div style="color:white; margin-bottom:10px; font-weight:bold;">Foto markieren (Rot)</div>
    <div id="draw-canvas-container">
        <canvas id="draw-canvas"></canvas>
    </div>
    <div class="draw-controls">
        <button style="background:#555;" onclick="closeDrawModal()">Abbrechen</button>
        <button style="background:var(--success);" onclick="saveDrawing()">Speichern</button>
    </div>
</div>

<div id="print-zone" style="display: none;"></div>

<script>
    // --- PWA Service Worker laden ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registriert!', reg);
            }).catch(err => console.log('Service Worker Fehler', err));
        });
    }

    // --- Projektverwaltung & Datenhaltung ---
    let projects = JSON.parse(localStorage.getItem('bau_projects')) || { "Standard Projekt": [] };
    let currentProjectName = localStorage.getItem('bau_current_project') || "Standard Projekt";

    if (!projects[currentProjectName]) {
        currentProjectName = Object.keys(projects)[0] || "Standard Projekt";
        if(!projects[currentProjectName]) projects[currentProjectName] = [];
    }
    let items = projects[currentProjectName];

    function saveProjects() {
        projects[currentProjectName] = items;
        localStorage.setItem('bau_projects', JSON.stringify(projects));
        localStorage.setItem('bau_current_project', currentProjectName);
    }

    // --- Import / Export aller Projekte ---
    function exportAllProjects() {
        saveProjects(); 
        const dataStr = JSON.stringify(projects, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const date = new Date().toISOString().split('T')[0];
        a.download = `BPB_Projekte_Backup_${date}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importAllProjects(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (typeof importedData === 'object' && !Array.isArray(importedData)) {
                    if(confirm("Möchtest du die aktuellen Projekte mit dem Backup überschreiben?")) {
                        projects = { ...projects, ...importedData };
                        const keys = Object.keys(importedData);
                        if(keys.length > 0) currentProjectName = keys[0];
                        items = projects[currentProjectName];
                        saveProjects();
                        renderProjectSelect();
                        render();
                        alert("Projekte erfolgreich importiert!");
                    }
                } else {
                    alert("Ungültiges Dateiformat.");
                }
            } catch (err) {
                alert("Fehler beim Lesen der JSON-Datei.");
            }
        };
        reader.readAsText(file);
        event.target.value = ""; 
    }

    // --- Projekt UI ---
    function renderProjectSelect() {
        const sel = document.getElementById('project-select');
        sel.innerHTML = '';
        for (let pName in projects) {
            const opt = document.createElement('option');
            opt.value = pName;
            opt.innerText = pName;
            if (pName === currentProjectName) opt.selected = true;
            sel.appendChild(opt);
        }
    }

    function switchProject() {
        saveProjects(); 
        currentProjectName = document.getElementById('project-select').value;
        items = projects[currentProjectName];
        render();
    }

    function newProject() {
        const name = prompt("Name des neuen Projekts:");
        if (name && !projects[name]) {
            saveProjects();
            projects[name] = [];
            currentProjectName = name;
            items = projects[currentProjectName];
            renderProjectSelect();
            render();
            saveProjects();
        } else if (projects[name]) {
            alert("Projektname existiert bereits!");
        }
    }
    
    function copyProject() {
        const name = prompt("Name des kopierten Projekts:", currentProjectName + " (Kopie)");
        if (name && !projects[name]) {
            saveProjects();
            // Deep copy items and ensure IDs are strings
            projects[name] = JSON.parse(JSON.stringify(items));
            projects[name].forEach(item => {
               item.id = 'copy_' + Date.now() + Math.floor(Math.random() * 1000); 
            });
            
            currentProjectName = name;
            items = projects[currentProjectName];
            renderProjectSelect();
            render();
            saveProjects();
        } else if (projects[name]) {
            alert("Projektname existiert bereits!");
        }
    }

    function renameProject() {
        const newName = prompt("Neuer Name für das Projekt:", currentProjectName);
        if (newName && newName !== currentProjectName && !projects[newName]) {
            projects[newName] = projects[currentProjectName];
            delete projects[currentProjectName];
            currentProjectName = newName;
            renderProjectSelect();
            saveProjects();
        }
    }

    function deleteProject() {
        if (Object.keys(projects).length <= 1) return alert("Das letzte Projekt kann nicht gelöscht werden.");
        if (confirm(`Projekt '${currentProjectName}' wirklich löschen?`)) {
            delete projects[currentProjectName];
            currentProjectName = Object.keys(projects)[0];
            items = projects[currentProjectName];
            renderProjectSelect();
            render();
            saveProjects();
        }
    }

    // --- GPS / Location Logik ---
    function getLocation(id) {
        if (!navigator.geolocation) {
            alert("GPS wird von deinem Browser nicht unterstützt.");
            return;
        }
        
        const btn = document.getElementById('btn-loc-' + id);
        if(btn) btn.innerText = "⏳ Suche Satelliten...";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                update(id, `${lat},${lng}`);
                render();
            },
            (error) => {
                alert("Fehler beim Abrufen der Position: " + error.message + "\nBitte prüfe, ob die Standortfreigabe im Browser aktiv ist.");
                if(btn) btn.innerText = "📍 Aktuellen Standort abrufen";
                render();
            },
            { enableHighAccuracy: true }
        );
    }

    // --- Editor Logik ---
    function addItem() {
        const type = document.getElementById('type-select').value;
        const label = document.getElementById('label-input').value || 'Neues Feld';
        items.push({ id: String(Date.now()), type: type, label: label, value: '' });
        document.getElementById('label-input').value = '';
        render();
    }

    function removeItem(id) { 
        items = items.filter(i => String(i.id) !== String(id)); 
        saveProjects();
        render(); 
    }
    
    function move(id, dir) {
        const idx = items.findIndex(i => String(i.id) === String(id));
        if (idx === -1) return;
        if (dir === -1 && idx > 0) [items[idx], items[idx-1]] = [items[idx-1], items[idx]];
        if (dir === 1 && idx < items.length-1) [items[idx], items[idx+1]] = [items[idx+1], items[idx]];
        saveProjects();
        render();
    }

    function update(id, val) {
        const item = items.find(i => String(i.id) === String(id));
        if (item) item.value = val;
        saveProjects();
    }
    
    function editLabel(id) {
        const item = items.find(i => String(i.id) === String(id));
        if(item) {
            const newLabel = prompt("Neue Beschriftung (Label) für dieses Feld:", item.label);
            if(newLabel !== null && newLabel.trim() !== "") {
                item.label = newLabel.trim();
                saveProjects();
                render();
            }
        }
    }

    function handleFile(e, id) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                update(id, dataUrl);
                render();
            }
        };
    }

    // --- Foto Markierung (Canvas) ---
    let drawingCanvas = document.getElementById('draw-canvas');
    let ctx = drawingCanvas.getContext('2d');
    let isDrawing = false;
    let editingPhotoId = null;

    function openDrawModal(id) {
        const item = items.find(i => String(i.id) === String(id));
        if(!item || !item.value) return;
        
        editingPhotoId = String(id);
        const modal = document.getElementById('draw-modal');
        modal.style.display = 'flex';

        const img = new Image();
        img.src = item.value;
        img.onload = function() {
            let w = img.width;
            let h = img.height;
            const maxW = window.innerWidth * 0.9;
            const maxH = window.innerHeight * 0.6;

            if(w > maxW) { h *= maxW/w; w = maxW; }
            if(h > maxH) { w *= maxH/h; h = maxH; }

            drawingCanvas.width = w;
            drawingCanvas.height = h;
            
            ctx.drawImage(img, 0, 0, w, h);
            
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
    }

    function closeDrawModal() {
        document.getElementById('draw-modal').style.display = 'none';
        editingPhotoId = null;
    }

    function saveDrawing() {
        if(!editingPhotoId) return;
        const dataUrl = drawingCanvas.toDataURL('image/jpeg', 0.9);
        update(editingPhotoId, dataUrl);
        closeDrawModal();
        render();
    }

    const getPos = (e) => {
        const rect = drawingCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const startDraw = (e) => { isDrawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); e.preventDefault(); };
    const draw = (e) => { if(!isDrawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); };
    const stopDraw = () => isDrawing = false;

    drawingCanvas.addEventListener('mousedown', startDraw);
    drawingCanvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDraw);
    drawingCanvas.addEventListener('touchstart', startDraw, {passive: false});
    drawingCanvas.addEventListener('touchmove', draw, {passive: false});
    drawingCanvas.addEventListener('touchend', stopDraw);


    // --- Render Formular ---
    function render() {
        const list = document.getElementById('editor-list');
        list.innerHTML = '';
        
        if (items.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:#888; margin-top:50px;">
                Noch keine Felder im Projekt '${currentProjectName}'.
            </div>`;
            return;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'field-card';
            
            let html = `
                <div class="field-header">
                    <div class="field-title">${item.type === 'header' ? '📑 ' : (item.type === 'checkbox' ? '☑ ' : (item.type === 'location' ? '📍 ' : '✏️ '))}${item.label}</div>
                    <div class="field-controls">
                        <button class="btn-ctrl" onclick="editLabel('${item.id}')">✏️</button>
                        <button class="btn-ctrl" onclick="move('${item.id}', -1)">↑</button>
                        <button class="btn-ctrl" onclick="move('${item.id}', 1)">↓</button>
                        <button class="btn-ctrl btn-delete" onclick="removeItem('${item.id}')">✖</button>
                    </div>
                </div>
            `;

            if (item.type === 'header') {
                html += `<div style="color:#888; font-size:0.85rem;">(Erscheint als Überschrift)</div>`;
            } else if (item.type === 'photo') {
                html += `
                    <label class="photo-upload-box">
                        📷 Foto hochladen / aufnehmen
                        <input type="file" accept="image/*" style="display:none" onchange="handleFile(event, '${item.id}')">
                    </label>
                    <img src="${item.value || ''}" class="photo-preview-img" style="display: ${item.value ? 'block' : 'none'}">
                    ${item.value ? `<button class="btn-edit-photo" onclick="openDrawModal('${item.id}')">🖌️ Bild markieren (Rot)</button>` : ''}
                `;
            } else if (item.type === 'checkbox') {
                html += `
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${item.value ? 'checked' : ''} onchange="update('${item.id}', this.checked)">
                        <label>Erledigt / Bestätigt</label>
                    </div>`;
            } else if (item.type === 'location') {
                if (item.value) {
                    const mapsUrl = `https://www.google.com/maps?q=${item.value}`;
                    html += `
                        <div style="margin-bottom: 8px;">Koordinaten: <b>${item.value}</b></div>
                        <div style="display: flex; gap: 10px;">
                            <a href="${mapsUrl}" target="_blank" style="background: #2980b9; color: white; padding: 6px 10px; border-radius: 4px; text-decoration: none; font-size: 0.85rem;">🗺️ In Maps testen</a>
                            <button class="btn-ctrl btn-delete" onclick="update('${item.id}', '')">🗑️ Verwerfen & Neu</button>
                        </div>`;
                } else {
                    html += `<button id="btn-loc-${item.id}" class="btn-action" style="background: #2980b9; width: 100%;" onclick="getLocation('${item.id}')">📍 Aktuellen Standort abrufen</button>`;
                }
            } else {
                const tag = item.type === 'textarea' ? 'textarea' : 'input type="text"';
                html += `<${tag} id="input-${item.id}" placeholder="Eingabe..." oninput="update('${item.id}', this.value)"></${tag === 'textarea' ? 'textarea' : 'input'}>`;
            }

            card.innerHTML = html;
            list.appendChild(card);
            
            if (item.type === 'text' || item.type === 'textarea') {
                const el = document.getElementById(`input-${item.id}`);
                if (el) el.value = item.value || '';
            }
        });
        
        saveProjects();
    }

    // --- Nativer Druck ---
    function generatePDF() {
        if(items.length === 0) return alert("Das Dokument ist leer!");

        const printZone = document.getElementById('print-zone');
        
        let printHTML = `
            <div class="print-header">
                <img src="logo.png" style="max-height: 60px; margin-bottom: 10px;">
                <h1>Übergabeprotokoll</h1>
                <p>Projekt: <b>${currentProjectName}</b> | Datum: ${new Date().toLocaleDateString('de-DE')} | ${new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})} Uhr</p>
            </div>
        `;

        items.forEach(item => {
            if (item.type === 'header') {
                printHTML += `<h2 class="print-title">${item.label}</h2>`;
            } else if (item.type === 'photo' && item.value) {
                printHTML += `
                    <div class="print-item">
                        <div class="print-label">${item.label}</div>
                        <img src="${item.value}" class="print-photo">
                    </div>`;
            } else if (item.type === 'checkbox') {
                 const statusText = item.value ? '☑ ERLEDIGT / JA' : '☐ OFFEN / NEIN';
                 const color = item.value ? '#27ae60' : '#e74c3c';
                 printHTML += `
                    <div class="print-item print-checkbox">
                        <div style="width: 70%;">${item.label}</div>
                        <div class="print-checkbox-val" style="color: ${color};">${statusText}</div>
                    </div>`;
            } else if (item.type === 'location') {
                if (item.value) {
                    const mapsUrl = `https://www.google.com/maps?q=${item.value}`;
                    printHTML += `
                        <div class="print-item">
                            <div class="print-label">${item.label}</div>
                            <div class="print-value">
                                <a href="${mapsUrl}" target="_blank" style="color: var(--primary); text-decoration: none;">📍 <u>In Google Maps öffnen (${item.value})</u></a>
                            </div>
                        </div>`;
                } else {
                    printHTML += `
                        <div class="print-item">
                            <div class="print-label">${item.label}</div>
                            <div class="print-value">- Kein Standort hinterlegt -</div>
                        </div>`;
                }
            } else {
                const textVal = item.value ? item.value.replace(/\n/g, '<br>') : '-';
                printHTML += `
                    <div class="print-item">
                        <div class="print-label">${item.label}</div>
                        <div class="print-value">${textVal}</div>
                    </div>`;
            }
        });

        printZone.innerHTML = printHTML;
        
        setTimeout(() => { window.print(); }, 300);
    }

    // Start
    renderProjectSelect();
    render();
</script>
</body>
</html>
